name: Android CI

on:
  push:
    branches: [ "l10n_master" ]
  pull_request:
    branches: [ "l10n_master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    # 1. 安装 Android SDK Command-line Tools
    # 这样可以设置好 ANDROID_HOME 环境变量和目录结构
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 2. 下载 aosp-android-jar 并替换
    # 注意：这里假设你的项目编译目标是 API 33 (Android 13)
    # 如果你的项目编译目标不同，请修改下面的 API_LEVEL 变量
    - name: Replace android.jar with AOSP version
      env:
        API_LEVEL: "36" # 请根据你的项目 compileSdkVersion 修改此处
      run: |
        # 创建平台目录（如果不存在）
        mkdir -p $ANDROID_HOME/platforms/android-${API_LEVEL}
        
        # 下载 aosp-android-jar
        # 这里的 URL 指向最新版本的 jar，你可以根据需要锁定具体版本
        wget -O aosp-android.jar https://github.com/Reginer/aosp-android-jar/raw/refs/heads/main/android-36/android-jdk21.jar
        
        # 备份原文件（可选）并替换
        mv $ANDROID_HOME/platforms/android-${API_LEVEL}/android.jar $ANDROID_HOME/platforms/android-${API_LEVEL}/android.jar.bak 2>/dev/null || true
        mv aosp-android.jar $ANDROID_HOME/platforms/android-${API_LEVEL}/android.jar

    # 3. 配置 Gradle
    # 在项目根目录创建 gradle.properties，禁止 SDK 检查，防止构建失败
    - name: Configure Gradle
      run: |
        echo "android.builder.sdkDownload=false" >> gradle.properties
        # 如果你的构建因为 lint 检查失败，可以添加以下行跳过 lint
        # echo "android.lint.ignoreGradleDependencies=true" >> gradle.properties

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build

    - name: Upload APK
      uses: actions/upload-artifact@v7.0.0
      with:
        name: app-debug
        path: app/build/outputs/apk/release/RootActivityLauncher_33-release.apk
